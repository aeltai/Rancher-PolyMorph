name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUT="rancher-polymorph_${VERSION}_${GOOS}_${GOARCH}"
          go build -ldflags "-s -w -X github.com/aeltai/rancher-polymorph/internal/version.Version=${VERSION}" \
            -o "${OUT}" .
          tar czf "${OUT}.tar.gz" "${OUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rancher-polymorph-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rancher-polymorph_*.tar.gz

  github-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
